<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="canonical" href="https://thehaguecouloir.com">
    <style>
        /* Keeps the screen cleanly blank during the instant redirect. 
       Fallback text only unhides if the redirect stalls. */
        body {
            display: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding: 3rem 2rem;
            text-align: center;
            color: #333;
            line-height: 1.6;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 1.5rem auto;
            max-width: 200px;
        }
    </style>
    <script>
        const newDomain = "https://thehaguecouloir.com";
        const repoName = "/thehaguecouloir";

        let path = window.location.pathname;
        const search = window.location.search;

        // Safely strip the GitHub repo name without hardcoded string lengths
        if (path.startsWith(repoName)) {
            path = path.substring(repoName.length);
        }

        if (!path.startsWith('/')) {
            path = '/' + path;
        }

        // Construct the absolute perfect destination URL
        const targetUrl = newDomain + path + search;

        // Trigger the invisible, instant browser redirect
        window.location.replace(targetUrl);

        // Backup safety: If the redirect takes longer than 1 second, reveal the manual links
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fallback-en').href = targetUrl;
            document.getElementById('fallback-ru').href = targetUrl;

            setTimeout(() => {
                document.body.style.display = 'block';
            }, 1000);
        });
    </script>
</head>

<body>
    <p>
        We've moved! Redirecting you to the new site...<br>
        If you are not redirected automatically, <a id="fallback-en" href="https://thehaguecouloir.com">click here</a>.
    </p>

    <hr>

    <p>
        Мы переехали! Перенаправляем вас на новый сайт...<br>
        Если перенаправление не произошло автоматически, <a id="fallback-ru" href="https://thehaguecouloir.com">нажмите
            здесь</a>.
    </p>
</body>

</html>
